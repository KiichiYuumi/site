<div class="tate">
    自縛の自覚<br>自縛の自覚<br>自縛の自覚<br>自縛の自覚<br><br>思い出せば全てうつつだろうか、あらゆる綻びを抱え歩いた日々の、夕方の月。はて、そこにあっただろうか。<br>私はこれまでの全てにしがみつこうと手を開いて引っ掻いて。爪も剥がれ落ちるばかりだのに、まだそれを自覚していなかった。見えない月の消息を追っていた。<br>指の骨がのぞいてようやく気がついた時には、惜しむ心も足りなくなっていた。<br><br>自縛の自覚<br>自縛の自覚よ<br><br>全てが夢

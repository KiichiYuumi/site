        <h3>クロネコイヌカラス——</h3>
        　おれの形をうまく思い出してみる。でもいつもうまくいかない。まためちゃくちゃだ。夢から醒めると、おれは冴えた意識で冷たい場所にいる。<br>　乱暴に積みあがった薪、蜘蛛の巣のかかったボロボロの板材を張り合わせた小屋、壁に空いた隙間から差す日光が、汚い床をほんの点で輝かせてた。<br>　おれはおれの不器用な黒い羽を、目覚めの伸びの代わりにめいいっぱい羽ばたかせる。今日はネコの足とカラスの羽。それ以外は見えるところにないから、わからなかった。<br>
